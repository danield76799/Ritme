name: Deploy Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter/setup-flutter@v4
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Setup Flutter cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/web
          key: ${{ runner.os }}-flutter-web-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-flutter-web-

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href /Ritme/

      - name: Verify build output
        run: ls -la build/web/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
