name: Build Android APK (Ritme)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true
      
    - name: Install Android SDK components
      run: |
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ritme-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        tag_name: v1.3.0-build${{ github.run_number }}
        name: Ritme v1.3.0 (Build ${{ github.run_number }})
        body: |
          ## Ritme - SRT Tracker v1.3.0
          
          **Nieuwe features:**
          - Gewicht tracking met grafiek
          - Medische afspraken met notities
          - Medicatie schema met herinneringen
          - Verbeterde UI/UX
          
          **Build info:**
          - Build nummer: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          
          **Let op:** Dit is een automatische build.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
